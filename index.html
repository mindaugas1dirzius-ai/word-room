<meta name="theme-color" content="#f0663a">
<style>
  :root{
    --glass-bg: rgba(24,26,32,0.28);
    --glass-stroke: rgba(255,255,255,0.30);
    --glass-hi: rgba(255,255,255,0.62);
    --blur: 14px; --radius: 22px;
    --ink:#fff; --ink-dim:rgba(255,255,255,.82);
    --gold:#ffce7a; --good:#7CF0B4;
    --safe-top:calc(10px + env(safe-area-inset-top,0px)); --safe-bottom:calc(12px + env(safe-area-inset-bottom,0px)); font-size:16px;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; height:100%; }
  body{ background:#05060a; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
        color:#fff; display:flex; align-items:center; justify-content:center; min-height:100dvh; padding:0; overflow:hidden; }
  /* Full-bleed: fills the whole screen on phones; on desktop stays a clean portrait column (no fake phone frame). */
  .phone{ position:relative; width:100%; max-width:520px; height:100dvh; overflow:hidden; isolation:isolate; }

  /* ===== camera target ===== */
  .stage{ position:absolute; inset:0; overflow:hidden; perspective:1000px; }
  .room{ position:absolute; inset:-12%; transform-origin:50% 50%; transform-style:preserve-3d;
         transition:transform 1100ms cubic-bezier(.6,.01,.15,1); will-change:transform; }
  #roomPhoto{ position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }
  /* ambient dust motes drifting in the window light */
  .motes{ position:absolute; inset:0; pointer-events:none; }
  .motes span{ position:absolute; width:5px; height:5px; border-radius:50%;
               background:radial-gradient(closest-side, rgba(255,244,214,.85), transparent);
               filter:blur(.6px); opacity:0; animation:mote linear infinite; }
  @keyframes mote{ 0%{transform:translateY(0) translateX(0); opacity:0;}
                   15%{opacity:.85;} 85%{opacity:.4;} 100%{transform:translateY(-190px) translateX(14px); opacity:0;} }

  /* per-object FX overlays (positioned over baked photo objects) */
  .fx{ position:absolute; pointer-events:none; opacity:0; }
  .fx.glow{ border-radius:50%;
            background:radial-gradient(closest-side, rgba(255,206,122,.85), rgba(255,170,90,.25) 55%, transparent 72%);
            mix-blend-mode:screen; }
  .fx.glow.on{ animation:glowOn 2.3s ease-out forwards; }
  /* lamp switch-on: a couple of flickers, then steady bloom, then fade */
  @keyframes glowOn{ 0%{opacity:0;transform:scale(.5);} 7%{opacity:1;transform:scale(.9);}
                     13%{opacity:.15;} 19%{opacity:1;} 26%{opacity:.45;} 34%{opacity:1;transform:scale(1.06);}
                     70%{opacity:.9;transform:scale(1);} 100%{opacity:0;transform:scale(1.14);} }
  /* map frame highlight pulse */
  .fx.frame{ border:3px solid rgba(255,206,122,0); border-radius:8px; }
  .fx.frame.on{ animation:framePulse 1.3s ease-out forwards; }
  @keyframes framePulse{ 0%{opacity:1; border-color:rgba(255,206,122,0); box-shadow:0 0 0 rgba(255,206,122,0); transform:scale(1);}
                         30%{border-color:rgba(255,222,150,.95); box-shadow:0 0 26px rgba(255,206,122,.75); transform:scale(1.03);}
                         100%{opacity:0; border-color:rgba(255,206,122,0); box-shadow:0 0 0 rgba(255,206,122,0); transform:scale(1);} }
  /* palm green shimmer */
  .fx.leaf{ border-radius:50%; background:radial-gradient(closest-side, rgba(130,240,165,.55), rgba(90,200,130,.15) 55%, transparent 72%); mix-blend-mode:screen; }
  .fx.leaf.on{ animation:leafGlow 1.4s ease-out forwards; }
  @keyframes leafGlow{ 0%{opacity:0;transform:scale(.7);} 30%{opacity:1;transform:scale(1.05);} 100%{opacity:0;transform:scale(1.12);} }
  .fx.sheen{ overflow:hidden; border-radius:6px; }
  .fx.sheen.on{ opacity:1; }
  .fx.sheen .bar{ position:absolute; top:-40%; left:-60%; width:40%; height:180%;
                  background:linear-gradient(90deg,transparent, rgba(255,244,214,.9), transparent);
                  transform:rotate(18deg); }
  .fx.sheen.on .bar{ animation:sweep 1.1s ease-in-out forwards; }
  @keyframes sweep{ from{ left:-60%; } to{ left:130%; } }
  .spark{ position:absolute; width:7px; height:7px; border-radius:50%;
          background:radial-gradient(closest-side,#fff,rgba(180,255,200,.2)); pointer-events:none; opacity:0; }
  .spark.on{ animation:sparkUp 1.1s ease-out forwards; }
  @keyframes sparkUp{ 0%{opacity:0;transform:translateY(0) scale(.5);} 30%{opacity:1;}
                      100%{opacity:0;transform:translateY(-46px) scale(1);} }

  /* Object highlight frame removed per owner request — the zoom + reaction stay, no gold frame. */
  .ring{ display:none !important; position:absolute; border:2px solid var(--gold); border-radius:16px;
         box-shadow:0 0 28px rgba(255,206,122,.85); opacity:0; transform:scale(.7);
         transition:opacity .4s, transform .5s; pointer-events:none; }
  .ring.show{ opacity:1; transform:scale(1); }
  .grade{ position:absolute; inset:0; pointer-events:none;
          background:radial-gradient(135% 100% at 50% 42%, transparent 62%, rgba(0,0,0,.34) 100%); }

  /* ===== frosted UI ===== */
  .glass{ background:var(--glass-bg); -webkit-backdrop-filter:blur(var(--blur)) saturate(150%);
          backdrop-filter:blur(var(--blur)) saturate(150%); border:1px solid var(--glass-stroke);
          border-radius:var(--radius); box-shadow:0 10px 30px -12px rgba(0,0,0,.45), inset 0 1px 0 var(--glass-hi); }
  .hud{ position:absolute; left:14px; right:14px; top:calc(var(--safe-top) + 6px); display:flex; align-items:center; gap:10px; z-index:20; }
  .pill{ display:flex; align-items:center; gap:8px; padding:9px 13px; font-weight:700; font-size:14px; text-shadow:0 1px 4px rgba(0,0,0,.5); }
  .pill .lvl{ color:var(--gold); } .spacer{ flex:1; } .coins{ color:var(--gold); }
  .icon-btn{ width:42px; height:42px; display:flex; align-items:center; justify-content:center; font-size:18px; border:none; color:#fff; cursor:pointer; text-shadow:0 1px 4px rgba(0,0,0,.5); }
  .objectives{ position:absolute; top:calc(var(--safe-top) + 60px); left:14px; right:14px; display:flex; gap:8px; z-index:20; }
  .chip{ flex:1; padding:9px 6px; text-align:center; font-weight:800; font-size:13px; letter-spacing:3px; color:var(--ink-dim); text-shadow:0 1px 4px rgba(0,0,0,.5); }
  .chip.found{ color:var(--good); border-color:rgba(124,240,180,.6); box-shadow:0 0 18px -4px rgba(124,240,180,.6), inset 0 1px 0 var(--glass-hi); }
  .draft{ position:absolute; bottom:296px; left:0; right:0; display:flex; justify-content:center; gap:8px; z-index:22; min-height:52px; pointer-events:none; }
  .draft .tile{ width:44px; height:52px; display:flex; align-items:center; justify-content:center; font-size:26px; font-weight:800; color:#3a2607;
                background:linear-gradient(180deg,#fff0cf,var(--gold)); border-radius:12px; box-shadow:0 6px 14px -4px rgba(0,0,0,.5), inset 0 2px 0 rgba(255,255,255,.7); animation:pop .18s ease; }
  @keyframes pop{ from{transform:scale(.4);opacity:0;} }
  .draft.bad .tile{ background:linear-gradient(180deg,#ffb3a6,#e0685a); color:#3a0e08; animation:shake .3s; }
  .draft.good .tile{ background:linear-gradient(180deg,#9ff0c4,var(--good)); color:#053; }
  @keyframes shake{ 0%,100%{transform:translateX(0);} 25%{transform:translateX(-6px);} 75%{transform:translateX(6px);} }

  .wheel-wrap{ position:absolute; left:0; right:0; bottom:calc(var(--safe-bottom) + 6px); display:flex; flex-direction:column; align-items:center; gap:14px; z-index:25; }
  .tools{ display:flex; gap:12px; }
  .tool{ width:52px; height:52px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1px; font-size:19px; cursor:pointer; position:relative; }
  .tool small{ font-size:9px; letter-spacing:.4px; color:var(--ink-dim); }
  .tool .badge{ position:absolute; top:-4px; right:-4px; background:var(--gold); color:#3a2607; font-size:10px; font-weight:800; width:18px; height:18px; border-radius:50%; display:flex; align-items:center; justify-content:center; }
  .wheel{ position:relative; width:240px; height:240px; border-radius:50%; display:flex; align-items:center; justify-content:center; touch-action:none; }
  .wheel .disc{ position:absolute; inset:0; border-radius:50%; background:transparent; border:none; box-shadow:none; }
  .wheel svg.link{ position:absolute; inset:0; width:100%; height:100%; pointer-events:none; z-index:2; }
  .letter{ position:absolute; width:56px; height:56px; margin:-28px 0 0 -28px; border-radius:50%; display:flex; align-items:center; justify-content:center;
           font-size:27px; font-weight:800; color:#fff; z-index:3; cursor:pointer; user-select:none; background:transparent;
           border:1px solid rgba(255,255,255,0.12);
           text-shadow:0 2px 10px rgba(0,0,0,.95), 0 0 4px rgba(0,0,0,.85); box-shadow:none; transition:transform .12s, background .12s, border-color .12s; }
  .letter.active{ background:linear-gradient(180deg,#fff0cf,var(--gold)); color:#3a2607; text-shadow:none; transform:scale(1.12); box-shadow:0 0 24px rgba(255,206,122,.8); }
  .shuffle{ position:absolute; width:44px; height:44px; border-radius:50%; z-index:4; display:flex; align-items:center; justify-content:center; font-size:18px; cursor:pointer; color:#fff;
            background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.28); text-shadow:0 1px 3px rgba(0,0,0,.5); }
  .shuffle:active{ transform:scale(.9) rotate(90deg); }

  .toast{ position:absolute; left:50%; top:42%; transform:translate(-50%,-50%) scale(.8); padding:18px 22px; text-align:center; z-index:40; opacity:0; pointer-events:none;
          transition:opacity .35s, transform .45s cubic-bezier(.2,1.4,.4,1); min-width:220px; }
  .toast.show{ opacity:1; transform:translate(-50%,-50%) scale(1); }
  .toast .big{ font-size:30px; font-weight:800; letter-spacing:2px; color:var(--gold); text-shadow:0 2px 10px rgba(0,0,0,.6); }
  .toast .sub{ margin-top:4px; font-size:13px; color:var(--ink-dim); }
  .toast .plus{ margin-top:8px; font-weight:800; color:var(--good); }
  .complete{ position:absolute; inset:0; z-index:60; display:flex; align-items:center; justify-content:center; opacity:0; pointer-events:none; transition:opacity .5s;
             background:rgba(6,9,15,.32); -webkit-backdrop-filter:blur(3px); backdrop-filter:blur(3px); }
  .complete.show{ opacity:1; pointer-events:auto; }
  .complete .card{ width:78%; padding:26px 22px; text-align:center; }
  .complete h2{ margin:0 0 6px; font-size:24px; color:var(--gold); }
  .complete p{ margin:0 0 16px; color:var(--ink-dim); font-size:14px; }
  .btn{ padding:12px 20px; border-radius:14px; border:1px solid var(--glass-stroke); background:linear-gradient(180deg,#fff0cf,var(--gold)); color:#3a2607; font-weight:800; font-size:15px; cursor:pointer; }
  .btn:active{ transform:translateY(1px); }
  .hint-note{ position:absolute; bottom:8px; left:0; right:0; text-align:center; font-size:11px; color:rgba(255,255,255,.65); z-index:10; text-shadow:0 1px 3px rgba(0,0,0,.7); }
  .confetti{ position:absolute; width:8px; height:12px; top:-20px; z-index:55; border-radius:2px; }

  /* ---- Spellnook intro / presentation splash ---- */
  #intro{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:#140e10;transition:opacity .55s ease;}
  #intro img{width:100%;height:100%;object-fit:cover;}
  #intro.hide{opacity:0;pointer-events:none;}
</style>
</head>

<script>
(function(){
  const LETTERS=["A","B","E","L","M","P","T"];
  const OBJECTS=["LAMP","MAP","PALM","TABLE"];
  const BONUS=["PALE","PLATE","MAPLE","AMPLE","TAMP","BEAM","MEAL","LAMB","ABLE","PELT","MALT","TAME","BLAME","LEAP","BEAT","BALE","PLEA","MEAT","BLEAT","LAME","PEAL"];
  const found=new Set(); const revealed={}; let coins=240, focusing=false, zoomIx=0; const HINT_COST=20, ZOOM_COST=50;

  /* ---- sound fx (synth, no files) ---- */
  let AC=null;
  function ac(){ if(!AC){ try{ AC=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } if(AC&&AC.state==='suspended')AC.resume(); return AC; }
  function beep(freq,dur,type,vol,slideTo){ const c=ac(); if(!c)return; const o=c.createOscillator(),g=c.createGain();
    o.type=type||'sine'; o.frequency.setValueAtTime(freq,c.currentTime); if(slideTo)o.frequency.exponentialRampToValueAtTime(slideTo,c.currentTime+dur);
    g.gain.setValueAtTime(0.0001,c.currentTime); g.gain.exponentialRampToValueAtTime(vol||0.15,c.currentTime+0.012); g.gain.exponentialRampToValueAtTime(0.0001,c.currentTime+dur);
    o.connect(g).connect(c.destination); o.start(); o.stop(c.currentTime+dur+0.03); }
  function sTick(){ beep(500+Math.random()*50,0.05,'triangle',0.10); }
  function sGood(){ [523,659,784,1047].forEach((f,i)=>setTimeout(()=>beep(f,0.18,'sine',0.16),i*70)); }
  function sBonus(){ beep(680,0.12,'sine',0.13); setTimeout(()=>beep(900,0.14,'sine',0.13),85); }
  function sBad(){ beep(320,0.10,'triangle',0.11,250); setTimeout(()=>beep(240,0.15,'triangle',0.11,185),75); }
  function sShuffle(){ beep(320,0.2,'triangle',0.09,720); }
  function sWin(){ [523,659,784,1047,1319].forEach((f,i)=>setTimeout(()=>beep(f,0.26,'sine',0.18),i*95)); }
  window.addEventListener('pointerdown',function(){ ac(); });

  const wheel=document.getElementById('wheel'), poly=document.getElementById('poly'),
        draft=document.getElementById('draft'), room=document.getElementById('room'),
        ring=document.getElementById('ring'), toast=document.getElementById('toast');

  /* focus anchors tuned to THIS photo (x%,y% within room, zoom) */
  const FOCUS={ LAMP:{x:41,y:63,z:2.0}, MAP:{x:27,y:31,z:1.95}, PALM:{x:72,y:56,z:1.75}, TABLE:{x:40,y:80,z:1.95} };

  /* place FX overlays over the photo objects */
  function placeFx(){
    const L=FOCUS.LAMP, P=FOCUS.PALM;
    const lamp=document.getElementById('fxLamp');
    lamp.style.left=(L.x-13)+'%'; lamp.style.top=(L.y-13)+'%'; lamp.style.width='26%'; lamp.style.height='26%';
    const map=document.getElementById('fxMap');
    map.style.left='7%'; map.style.top='16%'; map.style.width='40%'; map.style.height='31%';
    const fr=document.getElementById('fxFrame');
    fr.style.left='7%'; fr.style.top='16%'; fr.style.width='40%'; fr.style.height='31%';
    const leaf=document.getElementById('fxLeaf');
    leaf.style.left=(P.x-16)+'%'; leaf.style.top=(P.y-16)+'%'; leaf.style.width='32%'; leaf.style.height='32%';
    const T=FOCUS.TABLE, tb=document.getElementById('fxTable');
    tb.style.left=(T.x-16)+'%'; tb.style.top=(T.y-7)+'%'; tb.style.width='32%'; tb.style.height='15%';
  }

  function renderObjectives(){
    document.getElementById('objectives').innerHTML=OBJECTS.map(w=>{
      const done=found.has(w), rev=revealed[w]||null;
      const slots=w.split('').map((c,i)=>{ if(done) return `<span>${c}</span>`; if(rev&&rev.has(i)) return `<span style="color:var(--gold)">${c}</span>`; return `<span>•</span>`; }).join('');
      return `<div class="chip glass ${done?'found':''}"><span class="slots">${slots}</span></div>`;
    }).join('');
  }
  let order=LETTERS.slice();
  function layout(){
    wheel.querySelectorAll('.letter').forEach(n=>n.remove());
    const R=88,cx=120,cy=120;
    order.forEach((ch,i)=>{ const a=(-90+i*(360/order.length))*Math.PI/180;
      const x=cx+R*Math.cos(a),y=cy+R*Math.sin(a);
      const el=document.createElement('div'); el.className='letter'; el.textContent=ch;
      el.style.left=x+'px'; el.style.top=y+'px'; el.dataset.ch=ch; el._pt={x,y}; wheel.appendChild(el); });
  }
  let dragging=false,picked=[];
  function pt(e){ const r=wheel.getBoundingClientRect(),t=e.touches?e.touches[0]:e; return {x:(t.clientX-r.left)*(240/r.width),y:(t.clientY-r.top)*(240/r.height)}; }
  function nearest(p){ let b=null,bd=999; wheel.querySelectorAll('.letter').forEach(el=>{ const d=Math.hypot(el._pt.x-p.x,el._pt.y-p.y); if(d<32&&d<bd){bd=d;b=el;} }); return b; }
  function line(ex){ const pts=picked.map(el=>`${el._pt.x},${el._pt.y}`); if(ex)pts.push(`${ex.x},${ex.y}`); poly.setAttribute('points',pts.join(' ')); }
  function drawDraft(){ draft.className='draft'; draft.innerHTML=picked.map(el=>`<div class="tile">${el.dataset.ch}</div>`).join(''); }
  function add(el){ if(!el||picked.includes(el))return; picked.push(el); el.classList.add('active'); drawDraft(); line(); sTick(); }
  function start(e){ dragging=true; picked=[]; add(nearest(pt(e))); e.preventDefault(); }
  function move(e){ if(!dragging)return; const p=pt(e); add(nearest(p)); line(p); e.preventDefault(); }
  function end(){ if(!dragging)return; dragging=false; const w=picked.map(el=>el.dataset.ch).join(''); poly.setAttribute('points','');
    wheel.querySelectorAll('.letter.active').forEach(el=>el.classList.remove('active')); evaluate(w); picked=[]; }
  wheel.addEventListener('mousedown',start); wheel.addEventListener('touchstart',start,{passive:false});
  window.addEventListener('mousemove',move); window.addEventListener('touchmove',move,{passive:false});
  window.addEventListener('mouseup',end); window.addEventListener('touchend',end);

  function evaluate(w){
    if(w.length<3){ draft.innerHTML=''; return; }
    if(OBJECTS.includes(w)&&!found.has(w)){ solve(w,true); return; }
    if(BONUS.includes(w)&&!found.has('b:'+w)){ found.add('b:'+w); draft.className='draft good'; coins+=5; setCoins(); sBonus(); flash(w,'bonus word','+5 ◈'); setTimeout(()=>draft.innerHTML='',700); return; }
    sBad(); draft.className='draft bad'; setTimeout(()=>draft.innerHTML='',450);
  }
  function solve(w,byPlayer){ sGood(); found.add(w); draft.className='draft good'; renderObjectives(); if(byPlayer!==false) coins+=20; setCoins();
    const f=FOCUS[w]; focusing=true;
    room.style.transition='transform 1100ms cubic-bezier(.6,.01,.15,1)';
    const mx=(50-f.x)*f.z, my=(50-f.y)*f.z; room.style.transform=`translate(${mx*0.55}%,${my*0.55}%) scale(${f.z})`;
    ring.style.left=(f.x-11)+'%'; ring.style.top=(f.y-9)+'%'; ring.style.width='22%'; ring.style.height='20%'; ring.classList.add('show');
    setTimeout(()=>react(w,f),560); flash(w,'object found', byPlayer!==false?'+20 ◈':'');
    setTimeout(()=>{ room.style.transform=''; ring.classList.remove('show'); draft.innerHTML=''; },2200);
    setTimeout(()=>{ focusing=false; },3400);
    if(OBJECTS.every(x=>found.has(x))) setTimeout(complete,2400);
  }
  function react(w,f){
    if(w==='LAMP'){ const g=document.getElementById('fxLamp'); g.classList.remove('on'); void g.offsetWidth; g.classList.add('on'); }
    if(w==='MAP'){ const s=document.getElementById('fxMap'), fr=document.getElementById('fxFrame');
      [s,fr].forEach(el=>{ el.classList.remove('on'); void el.offsetWidth; el.classList.add('on'); setTimeout(()=>el.classList.remove('on'),1400); }); }
    if(w==='PALM'){ const lf=document.getElementById('fxLeaf'); lf.classList.remove('on'); void lf.offsetWidth; lf.classList.add('on'); setTimeout(()=>lf.classList.remove('on'),1500);
      for(let i=0;i<12;i++){ const sp=document.createElement('div'); sp.className='spark';
        sp.style.left=(f.x-8+Math.random()*16)+'%'; sp.style.top=(f.y-6+Math.random()*14)+'%';
        room.appendChild(sp); void sp.offsetWidth; sp.style.animationDelay=(i*50)+'ms'; sp.classList.add('on');
        setTimeout(()=>sp.remove(),1400); } }
    if(w==='TABLE'){ const tb=document.getElementById('fxTable'); tb.classList.remove('on'); void tb.offsetWidth; tb.classList.add('on'); }
  }
  function flash(w,l,p){ document.getElementById('toastWord').textContent=w; toast.querySelector('.sub').textContent=l; document.getElementById('toastPlus').textContent=p; toast.classList.add('show'); setTimeout(()=>toast.classList.remove('show'),1400); }
  function setCoins(){ document.querySelector('.coins').textContent='◈ '+coins; }
  function complete(){ sWin(); document.getElementById('complete').classList.add('show');
    for(let i=0;i<24;i++){ const c=document.createElement('div'); c.className='confetti'; c.style.left=Math.random()*100+'%';
      c.style.background=['#ffce7a','#7CF0B4','#8fd0ff','#ff9db1'][i%4]; c.style.animation=`fall ${1.2+Math.random()}s linear ${Math.random()*.4}s forwards`; document.querySelector('.phone').appendChild(c); } }
  const st=document.createElement('style'); st.textContent='@keyframes fall{to{transform:translateY(940px) rotate(540deg);opacity:0}}'; document.head.appendChild(st);

  /* image stays static; camera only moves on a correct find */

  const shuffleBtn=document.getElementById('shuffle');
  function doShuffle(e){ if(e){ e.stopPropagation(); e.preventDefault(); }
    /* Fisher-Yates: real random re-layout each press */
    for(let i=order.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [order[i],order[j]]=[order[j],order[i]]; }
    sShuffle(); layout(); }
  /* Handle press directly + stop it reaching the wheel's drag handler (which on touch
     preventDefault'ed the tap, so the button never fired). */
  shuffleBtn.addEventListener('touchstart',doShuffle,{passive:false});
  shuffleBtn.addEventListener('mousedown',doShuffle);
  shuffleBtn.addEventListener('click',e=>{ e.stopPropagation(); });
  document.getElementById('hintBtn').addEventListener('click',()=>{
    const cand=OBJECTS.filter(w=>!found.has(w) && (!revealed[w] || revealed[w].size<w.length)); if(!cand.length){ sBad(); return; }
    if(coins<HINT_COST){ sBad(); return; }
    const w=cand[Math.floor(Math.random()*cand.length)]; if(!revealed[w]) revealed[w]=new Set();
    const pos=[]; for(let i=0;i<w.length;i++) if(!revealed[w].has(i)) pos.push(i);
    revealed[w].add(pos[Math.floor(Math.random()*pos.length)]);
    coins-=HINT_COST; setCoins(); renderObjectives(); sBonus();
    if(revealed[w].size===w.length){ solve(w,false); } });
  function peek(w){ const f=FOCUS[w]; focusing=true;
    room.style.transition='transform 900ms cubic-bezier(.6,.01,.15,1)';
    const mx=(50-f.x)*f.z, my=(50-f.y)*f.z; room.style.transform='translate('+(mx*0.55)+'%,'+(my*0.55)+'%) scale('+f.z+')';
    setTimeout(()=>react(w,f),500);   /* ZOOM help now lights up the object too (like a find) */
    setTimeout(()=>{ room.style.transform=''; },1500);
    setTimeout(()=>{ focusing=false; },2500); }
  document.getElementById('revealBtn').addEventListener('click',()=>{ const cand=OBJECTS.filter(w=>!found.has(w)); if(!cand.length)return; if(coins<ZOOM_COST){ sBad(); return; } coins-=ZOOM_COST; setCoins(); const w=cand[zoomIx%cand.length]; zoomIx++; peek(w); sBonus(); });
  document.getElementById('nextBtn').addEventListener('click',()=>{ document.getElementById('complete').classList.remove('show'); found.clear(); Object.keys(revealed).forEach(k=>delete revealed[k]); zoomIx=0; focusing=false; room.style.transform=''; ring.classList.remove('show'); document.querySelectorAll('.confetti').forEach(c=>c.remove()); renderObjectives(); });

  /* ambient dust motes in the window light */
  const motes=document.getElementById('motes');
  for(let i=0;i<9;i++){ const s=document.createElement('span');
    s.style.left=(58+Math.random()*34)+'%'; s.style.top=(20+Math.random()*55)+'%';
    s.style.animationDuration=(7+Math.random()*6)+'s'; s.style.animationDelay=(Math.random()*8)+'s'; motes.appendChild(s); }

  placeFx(); renderObjectives(); layout();
})();
</script>

<script>(function(){var el=document.getElementById("intro");if(!el)return;function hide(){el.classList.add("hide");setTimeout(function(){el.style.display="none";},650);}var t=setTimeout(hide,2600);el.addEventListener("pointerdown",function(){clearTimeout(t);hide();});})();</script>
