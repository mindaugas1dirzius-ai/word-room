<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Spellnook</title>
<meta name="theme-color" content="#e9dfce">
<link rel="icon" href="assets/branding/spellnook_appicon_square.png">
<link rel="apple-touch-icon" href="assets/branding/spellnook_appicon_square.png">
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Nunito:wght@600;700;800&display=swap');

/* ===================================================================
   Spellnook — data-driven engine. ONE scene photo adapts to device.
   Landscape = photo covers full screen, frosted UI at edges.
   Portrait  = SAME photo shown whole (contain, 16:9 band) on an ivory
               background (blurred copy of the scene) with UI around it.
   Full method: IRENGINIU_ADAPTACIJA.md
   =================================================================== */

:root{
  --ivory:#f7f1e6; --ivory2:#e9dfce; --ink:#5a4633; --ink2:#6b5540;
  --gold:#e8bf76; --gold-d:#c99a45; --gold-ink:#6b4e1e; --amber:#9a7326;
  --green:#5f7d4e;
  --serif:'Fraunces',Georgia,'Times New Roman',serif;
  --sans:'Nunito',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,system-ui,sans-serif;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
  --safe-left:env(safe-area-inset-left,0px);
  --safe-right:env(safe-area-inset-right,0px);
}
*{ box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
html,body{ height:100%; }
body{ font-family:var(--sans); color:var(--ink); background:#2b2724; overflow:hidden;
      -webkit-user-select:none; user-select:none; }

.phone{ position:fixed; inset:0; overflow:hidden; isolation:isolate; }

/* ---- scene photo (the .room box; FX % are relative to it) ---- */
.scene{ position:absolute; inset:0; overflow:hidden; z-index:1; }
.room{ position:absolute; inset:0; transform-origin:50% 50%;
       transition:transform 1100ms cubic-bezier(.6,.01,.15,1); will-change:transform; }
#roomPhoto{ position:absolute; inset:0; width:100%; height:100%; object-fit:cover; display:block; }
#fxLayer{ position:absolute; inset:0; pointer-events:none; z-index:2; }

/* ambient blurred background of the same scene (portrait fills the ivory around the photo) */
.bg{ position:absolute; inset:0; z-index:0; overflow:hidden; display:none;
     background:radial-gradient(125% 90% at 50% 15%, var(--ivory), var(--ivory2) 70%, #e2d4bb); }
.bgphoto{ position:absolute; left:-20%; top:-14%; width:140%; height:135%;
          object-fit:cover; filter:blur(42px) saturate(1.25); opacity:.5; }
.veil{ position:absolute; inset:0;
       background:linear-gradient(160deg,rgba(247,241,230,.5),rgba(233,223,206,.6)); }

/* ===================== shared frosted bits ===================== */
.frost{ background:rgba(255,255,255,.30); border:1px solid rgba(255,255,255,.6);
        -webkit-backdrop-filter:blur(12px); backdrop-filter:blur(12px); }

/* ---- top HUD (level / coins / settings) ---- */
.hud{ position:absolute; z-index:20; display:flex; align-items:center; }
.level{ font-weight:800; font-size:13px; color:#fff; padding:6px 13px; border-radius:16px;
        background:rgba(70,55,40,.42); border:1px solid rgba(255,255,255,.35);
        -webkit-backdrop-filter:blur(8px); backdrop-filter:blur(8px); text-shadow:0 1px 3px rgba(0,0,0,.4); }
.level b{ color:#ffe08a; }
.topR{ position:absolute; z-index:20; display:flex; gap:8px; align-items:center; }
.coins{ display:flex; align-items:center; gap:6px; font-weight:800; font-size:14px; color:#ffe08a;
        padding:6px 12px; border-radius:16px; background:rgba(70,55,40,.42);
        border:1px solid rgba(255,255,255,.35); -webkit-backdrop-filter:blur(8px); backdrop-filter:blur(8px); }
.coins .g{ width:13px;height:13px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#ffe08a,#d9a33a); }
.gear{ width:33px;height:33px;border-radius:50%;display:flex;align-items:center;justify-content:center;
       font-size:15px;color:#fff;cursor:pointer;background:rgba(70,55,40,.42);
       border:1px solid rgba(255,255,255,.35); -webkit-backdrop-filter:blur(8px); backdrop-filter:blur(8px); }

/* ---- find bar ---- */
.findbar{ position:absolute; z-index:20; display:flex; gap:8px; justify-content:center; }
.findbar .pill{ padding:4px 11px; border-radius:13px; font-weight:800; font-size:11px; color:#7a5c3c;
                background:rgba(255,255,255,.5); border:1px solid rgba(255,255,255,.8);
                -webkit-backdrop-filter:blur(8px); backdrop-filter:blur(8px); }
.findbar .b2{ color:var(--amber); background:rgba(212,170,80,.22); border-color:rgba(190,150,70,.45); }

/* ---- word strip ---- */
.win{ position:absolute; z-index:20; height:42px; border-radius:13px; overflow:hidden;
      background:rgba(255,255,255,.30); border:1px solid rgba(255,255,255,.6);
      touch-action:none; cursor:grab; -webkit-backdrop-filter:blur(8px); backdrop-filter:blur(8px); }
.win.drag{ cursor:grabbing; }
.win::after{ content:""; position:absolute; inset:0; pointer-events:none; border-radius:13px;
             box-shadow:inset 18px 0 14px -14px rgba(150,120,85,.5), inset -18px 0 14px -14px rgba(150,120,85,.5); }
.win .focus{ position:absolute; top:3px; bottom:3px; left:50%; width:54px; transform:translateX(-50%);
             border-radius:9px; background:rgba(212,170,80,.14); border:1px dashed rgba(190,150,70,.5); pointer-events:none; }
.track{ position:absolute; top:0; left:0; height:100%; display:flex; align-items:center; gap:11px; will-change:transform; }
.wd{ display:flex; gap:3px; flex:0 0 auto; align-items:center; }
.wd.solved{ padding:4px 10px; border-radius:8px; background:linear-gradient(180deg,#ffe9b8,var(--gold));
            border:1px solid var(--gold-d); color:var(--gold-ink); font-weight:800; font-size:12px; letter-spacing:.5px; }
.cell{ width:16px; height:22px; border-radius:4px; background:rgba(255,255,255,.62);
       border:1px solid rgba(150,120,85,.4); display:flex; align-items:center; justify-content:center;
       font-size:12px; font-weight:800; color:#4f3e2c; }
.cell.fill{ background:linear-gradient(180deg,#ffe9b8,var(--gold)); border-color:var(--gold-d); color:var(--gold-ink); }

/* ---- help tools ---- */
.ht{ display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer;
     border-radius:13px; background:rgba(255,255,255,.42); border:1px solid rgba(255,255,255,.75);
     -webkit-backdrop-filter:blur(8px); backdrop-filter:blur(8px); }
.ht .hi{ font-size:16px; line-height:1; }
.ht b{ font-size:10px; letter-spacing:.06em; color:#6b5540; font-weight:800; margin-top:2px; }
.ht small{ font-size:9px; color:var(--amber); font-weight:800; margin-top:1px; }
.ht.solve{ background:rgba(212,170,80,.32); border-color:rgba(190,150,70,.6); }
.ht.skip{ background:rgba(95,125,78,.16); border:1px dashed rgba(95,125,78,.6); }
.ht.skip .hi,.ht.skip b{ color:#4f6a40; }
.ht.skip .ad{ background:var(--green); color:#fff; padding:1px 5px; border-radius:5px; font-size:8px; margin-top:2px; font-weight:800; }
.ht:active{ transform:translateY(1px); }
.ht.disabled{ opacity:.45; pointer-events:none; }

/* ---- current word bubble + bonus flash ---- */
.cwbubble{ position:absolute; z-index:24; background:linear-gradient(180deg,#ffe9b8,var(--gold));
           color:var(--gold-ink); font-weight:800; font-size:15px; letter-spacing:.06em; padding:6px 18px;
           border-radius:15px; border:1px solid var(--gold-d); box-shadow:0 6px 14px rgba(120,90,40,.3);
           opacity:0; pointer-events:none; transition:opacity .18s, transform .18s; white-space:nowrap; }
.cwbubble.show{ opacity:1; }
.plusflash{ position:absolute; z-index:25; font-weight:800; font-size:16px; color:var(--amber);
            background:rgba(255,247,230,.9); border:1px solid rgba(190,150,70,.5); padding:4px 12px;
            border-radius:12px; opacity:0; pointer-events:none; }
.plusflash.show{ animation:plusUp 1.1s ease-out forwards; }
@keyframes plusUp{ 0%{opacity:0;transform:translate(-50%,6px) scale(.8);} 18%{opacity:1;transform:translate(-50%,0) scale(1);}
                   75%{opacity:1;} 100%{opacity:0;transform:translate(-50%,-24px) scale(1);} }

/* ---- wheel ---- */
.wheelpanel{ position:absolute; z-index:22; display:flex; align-items:center; justify-content:center; }
.wheel{ position:relative; width:240px; height:240px; touch-action:none; }
.wheel .ring{ position:absolute; left:50%; top:50%; width:172px; height:172px; transform:translate(-50%,-50%);
              border:1.5px solid rgba(150,120,85,.4); border-radius:50%; }
.wheel svg.link{ position:absolute; inset:0; width:100%; height:100%; pointer-events:none; z-index:2; }
.letter{ position:absolute; width:42px; height:42px; margin:-21px 0 0 -21px; border-radius:12px;
         display:flex; align-items:center; justify-content:center; font-size:18px; font-weight:800; color:#4f3e2c;
         background:linear-gradient(180deg,#fffdf8,#f0e7d6); border:1px solid rgba(255,255,255,.95);
         box-shadow:0 4px 9px rgba(90,65,35,.25); z-index:3; cursor:pointer;
         transition:transform .12s, background .12s, box-shadow .12s; }
.letter.active{ background:linear-gradient(180deg,#ffe9b8,var(--gold)); color:var(--gold-ink);
                transform:scale(1.12); box-shadow:0 0 20px rgba(232,191,118,.9); }
.shuffle{ position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); width:34px; height:34px;
          border-radius:50%; z-index:4; display:flex; align-items:center; justify-content:center; font-size:16px;
          cursor:pointer; color:#8a6b4a; background:rgba(255,255,255,.65); border:1px solid rgba(255,255,255,.9); }
.shuffle:active{ transform:translate(-50%,-50%) scale(.9) rotate(90deg); }

/* ===================== PORTRAIT layout ===================== */
@media (orientation:portrait){
  .bg{ display:block; }
  .scene{ inset:auto; left:10px; right:10px; top:calc(var(--safe-top) + 96px); height:auto; aspect-ratio:16/9;
          border-radius:18px; box-shadow:0 16px 40px -14px rgba(60,40,20,.45); }
  #roomPhoto{ object-fit:cover; }        /* scene box is 16:9 = image 16:9 → whole photo shown, nothing cropped */
  .hud{ top:calc(var(--safe-top) + 12px); left:14px; }
  .topR{ top:calc(var(--safe-top) + 12px); right:14px; }
  .findbar{ top:calc(var(--safe-top) + 52px); left:0; right:0; }
  .win{ top:calc(var(--safe-top) + 96px + 56vw + 8px); left:14px; right:14px; }
  .helps{ position:absolute; z-index:20; left:14px; right:14px;
          top:calc(var(--safe-top) + 96px + 56vw + 60px);
          display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
  .ht{ padding:7px 0; }
  .cwbubble{ left:50%; transform:translateX(-50%); bottom:calc(var(--safe-bottom) + 232px); }
  .plusflash{ left:50%; bottom:calc(var(--safe-bottom) + 232px); }
  /* no frame around the wheel — solid ivory background shows through; raised off the bottom */
  .wheelpanel{ left:0; right:0; bottom:calc(var(--safe-bottom) + 40px); height:240px;
               background:transparent; border:none; }
}

/* ===================== LANDSCAPE layout ===================== */
@media (orientation:landscape){
  #roomPhoto{ object-fit:cover; }        /* full-screen cover — the landscape hero */
  .hud{ top:calc(var(--safe-top) + 13px); left:calc(var(--safe-left) + 15px); }
  .topR{ top:calc(var(--safe-top) + 13px); right:calc(var(--safe-right) + 15px); }
  .findbar{ top:calc(var(--safe-top) + 60px); left:0; right:0; }
  .win{ top:calc(var(--safe-top) + 13px); left:50%; transform:translateX(-50%); width:min(46vw,470px); }
  .helps{ display:contents; }
  .lHleft,.lHright{ position:absolute; z-index:20; bottom:calc(var(--safe-bottom) + 15px);
                    display:flex; flex-direction:column; gap:7px; }
  .lHleft{ left:calc(var(--safe-left) + 15px); }
  .lHright{ right:calc(var(--safe-right) + 15px); }
  .lHleft .ht,.lHright .ht{ width:92px; padding:5px 0;
        background:rgba(255,255,255,.30); border:1px solid rgba(255,255,255,.6);
        -webkit-backdrop-filter:blur(10px); backdrop-filter:blur(10px); }
  .lHleft .ht b,.lHright .ht b{ color:#3a2c1c; }
  .cwbubble{ left:50%; transform:translateX(-50%); bottom:calc(var(--safe-bottom) + 208px); }
  .plusflash{ left:50%; bottom:calc(var(--safe-bottom) + 208px); }
  .wheelpanel{ left:50%; transform:translateX(-50%); bottom:calc(var(--safe-bottom) + 4px); width:240px; height:240px; }
  .wheel .ring{ border-color:rgba(255,255,255,.55); }
}
/* portrait puts the 6 helps in .helps grid; landscape uses .lHleft/.lHright wrappers.
   Both reference the SAME .ht nodes moved by JS per orientation. */

/* ===================== level complete ===================== */
.lcover{ position:absolute; inset:0; z-index:60; display:flex; align-items:center; justify-content:center;
         padding:24px; opacity:0; pointer-events:none; transition:opacity .45s;
         background:rgba(43,39,36,.55); -webkit-backdrop-filter:blur(4px); backdrop-filter:blur(4px); }
.lcover.show{ opacity:1; pointer-events:auto; }
.lc{ width:100%; max-width:360px; background:rgba(255,255,255,.55); border:1px solid rgba(255,255,255,.85);
     border-radius:24px; padding:24px 20px; -webkit-backdrop-filter:blur(14px); backdrop-filter:blur(14px);
     box-shadow:0 18px 40px rgba(90,65,35,.35); text-align:center; }
.lc-h{ font-family:var(--serif); font-weight:700; font-size:23px; color:var(--ink); }
.lc-sub{ font-size:12px; color:#8a6b4a; margin-top:2px; font-weight:700; margin-bottom:16px; }
.lc .rows{ display:flex; flex-direction:column; gap:8px; }
.lc .row{ display:flex; justify-content:space-between; font-size:14px; color:var(--ink2); font-weight:700; padding:0 4px; }
.lc .row span:last-child{ color:var(--amber); font-weight:800; }
.lc .row.total{ border-top:1px solid rgba(150,120,85,.3); margin-top:4px; padding-top:8px; font-size:16px; color:var(--ink); }
.bwrap{ margin-top:16px; text-align:left; }
.bwrap-h{ font-size:11px; font-weight:800; color:#7a5c3c; margin-bottom:7px; }
.bwords{ display:flex; flex-wrap:wrap; gap:6px; max-height:96px; overflow:auto; }
.bw{ font-size:11px; font-weight:800; padding:4px 8px; border-radius:7px; background:rgba(255,255,255,.5);
     border:1px solid rgba(150,120,85,.3); color:#b3a08a; }
.bw.got{ background:linear-gradient(180deg,#ffe9b8,var(--gold)); border-color:var(--gold-d); color:var(--gold-ink); }
.next{ margin-top:18px; padding:13px; border-radius:15px; background:linear-gradient(180deg,var(--gold),#d3a24c);
       color:#4a3412; font-weight:800; font-size:15px; cursor:pointer;
       box-shadow:0 8px 18px rgba(150,110,40,.35); border:1px solid var(--gold-d); }
.next:active{ transform:translateY(1px); }

/* ---- rewarded-ad placeholder ---- */
.admodal{ position:absolute; inset:0; z-index:70; display:flex; align-items:center; justify-content:center;
          padding:24px; opacity:0; pointer-events:none; transition:opacity .3s; background:rgba(20,16,14,.72); }
.admodal.show{ opacity:1; pointer-events:auto; }
.adcard{ width:100%; max-width:320px; background:#211b17; border:1px solid rgba(255,255,255,.15);
         border-radius:20px; padding:26px 22px; text-align:center; color:#efe4d0; }
.adcard .play{ font-size:34px; }
.adcard h3{ font-family:var(--serif); font-weight:700; font-size:19px; margin:8px 0 4px; color:#ffe08a; }
.adcard p{ font-size:12px; color:#c7b9a4; margin-bottom:16px; }
.adcard .adbtn{ padding:11px 18px; border-radius:13px; font-weight:800; font-size:14px; cursor:pointer;
                border:1px solid var(--gold-d); background:linear-gradient(180deg,var(--gold),#d3a24c); color:#4a3412; }
.adcard .adx{ margin-top:10px; font-size:12px; color:#8a7c68; cursor:pointer; }

/* ---- FX overlays (per object) ---- */
.fx{ position:absolute; pointer-events:none; opacity:0; }
.fx.glow{ border-radius:50%;
          background:radial-gradient(closest-side, rgba(255,206,122,.85), rgba(255,170,90,.25) 55%, transparent 72%);
          mix-blend-mode:screen; }
.fx.glow.on{ animation:glowOn 2.3s ease-out forwards; }
@keyframes glowOn{ 0%{opacity:0;transform:scale(.5);} 7%{opacity:1;transform:scale(.9);}
                   13%{opacity:.15;} 19%{opacity:1;} 26%{opacity:.45;} 34%{opacity:1;transform:scale(1.06);}
                   70%{opacity:.9;transform:scale(1);} 100%{opacity:0;transform:scale(1.14);} }
.fx.leaf{ border-radius:50%; background:radial-gradient(closest-side, rgba(130,240,165,.55), rgba(90,200,130,.15) 55%, transparent 72%); mix-blend-mode:screen; }
.fx.leaf.on{ animation:leafGlow 1.4s ease-out forwards; }
@keyframes leafGlow{ 0%{opacity:0;transform:scale(.7);} 30%{opacity:1;transform:scale(1.05);} 100%{opacity:0;transform:scale(1.12);} }
.fx.radar{ border-radius:14px; border:2px solid rgba(255,224,138,0); }
.fx.radar.on{ animation:radarPulse 1.6s ease-out forwards; }
@keyframes radarPulse{ 0%{opacity:0;border-color:rgba(255,224,138,0);box-shadow:0 0 0 rgba(255,206,122,0);transform:scale(1);}
                       25%{opacity:1;border-color:rgba(255,224,138,.95);box-shadow:0 0 24px rgba(255,206,122,.7);transform:scale(1.04);}
                       100%{opacity:0;border-color:rgba(255,224,138,0);box-shadow:0 0 0 rgba(255,206,122,0);transform:scale(1);} }
.spark{ position:absolute; width:7px; height:7px; border-radius:50%;
        background:radial-gradient(closest-side,#fff,rgba(180,255,200,.2)); pointer-events:none; opacity:0; }
.spark.on{ animation:sparkUp 1.1s ease-out forwards; }
@keyframes sparkUp{ 0%{opacity:0;transform:translateY(0) scale(.5);} 30%{opacity:1;} 100%{opacity:0;transform:translateY(-46px) scale(1);} }
.confetti{ position:absolute; width:8px; height:12px; top:-20px; z-index:65; border-radius:2px; }

/* ---- Spellnook intro splash ---- */
#intro{ position:fixed; inset:0; z-index:9999; display:flex; align-items:center; justify-content:center;
        background:#140e10; transition:opacity .55s ease; }
#intro img{ width:100%; height:100%; object-fit:cover; }
#intro.hide{ opacity:0; pointer-events:none; }
</style>
</head>
<body>
<div id="intro"><img src="assets/branding/spellnook_splash.png" alt="Spellnook"></div>

<div class="phone">
  <div class="bg"><img class="bgphoto" id="bgPhoto" alt=""><div class="veil"></div></div>

  <div class="scene">
    <div class="room" id="room">
      <img id="roomPhoto" alt="scene">
      <div id="fxLayer"></div>
    </div>
  </div>

  <div class="hud"><div class="level">Level <b id="lvl">1</b></div></div>
  <div class="topR">
    <div class="coins"><span class="g"></span><span id="coinN">200</span></div>
    <div class="gear">⚙</div>
  </div>

  <div class="findbar">
    <span class="pill" id="findPill">🔍 Find 0/4</span>
    <span class="pill b2" id="bonusPill">✦ 0 bonus</span>
  </div>

  <div class="win" id="win"><div class="focus"></div><div class="track" id="track"></div></div>

  <!-- 6 help tools (moved by JS into .helps [portrait] or .lHleft/.lHright [landscape]) -->
  <div class="helps" id="helps"></div>
  <div class="lHleft" id="lHleft"></div>
  <div class="lHright" id="lHright"></div>

  <div class="cwbubble" id="cwbubble"></div>
  <div class="plusflash" id="plusflash"></div>

  <div class="wheelpanel">
    <div class="wheel" id="wheel">
      <div class="ring"></div>
      <svg class="link" viewBox="0 0 240 240"><polyline id="poly" points="" fill="none" stroke="url(#g)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#fff0cf"/><stop offset="1" stop-color="#e8bf76"/></linearGradient></defs></svg>
      <div class="shuffle" id="shuffle">⟳</div>
    </div>
  </div>

  <!-- level complete -->
  <div class="lcover" id="lcover"><div class="lc">
    <div class="lc-h">LEVEL COMPLETE</div><div class="lc-sub" id="lcSub">Home · Living Room</div>
    <div class="rows" id="lcRows"></div>
    <div class="bwrap"><div class="bwrap-h" id="lcBwH">Bonus words</div><div class="bwords" id="lcBwords"></div></div>
    <div class="next" id="nextBtn">Next Level →</div>
  </div></div>

  <!-- rewarded ad placeholder (SKIP) -->
  <div class="admodal" id="admodal"><div class="adcard">
    <div class="play">▶</div><h3>Rewarded Ad</h3>
    <p id="adText">Watch a short ad to skip this level.</p>
    <div class="adbtn" id="adWatch">Watch &amp; Skip</div>
    <div class="adx" id="adClose">No thanks</div>
  </div></div>
</div>

<script>
(function(){
  /* =============== DATA-DRIVEN LEVEL (scene = plug-in) =============== */
  const LEVEL={
    id:"t1-r1-living-room", round:1, place:"Home · Living Room",
    letters:["A","B","E","L","M","P","T"],
    image:"scenes/t1-r1-living-room_landscape.webp",
    /* target objects (found via wheel); focus = camera + FX position, % of scene box */
    focus:{
      MAP:{x:52,y:33,z:1.5,fx:"glow",w:34,h:34},
      LAMP:{x:9,y:52,z:2.2,fx:"glow",w:12,h:22},
      PALM:{x:88,y:48,z:1.8,fx:"leaf",w:14,h:36},
      TABLE:{x:45,y:78,z:1.8,fx:"glow",w:22,h:16}
    },
    bonusWords:["PALE","PLATE","MAPLE","AMPLE","TAMP","BEAM","MEAL","LAMB","ABLE","PELT","MALT","TAME","BLAME","LEAP","BEAT","BALE","PLEA","MEAT","BLEAT","LAME","PEAL"]
  };
  /* economy §9 (patvirtinta) — via config, ready for remote config */
  const ECON={ objectFind:5, bonusWord:2, levelBonus:15, start:200 };
  const COST={ shuffle:0, letter:25, first:40, zoom:60, radar:90, solve:120 };

  const OBJECTS=Object.keys(LEVEL.focus);
  const FOCUS=LEVEL.focus;
  const BONUS=LEVEL.bonusWords;
  const found=new Set();           // solved objects
  const bonusFound=new Set();      // bonus words found
  const revealed={};               // object -> Set of revealed letter indices
  let coins=ECON.start, focusing=false, zoomIx=0;

  /* -------- sound (synth, no files) -------- */
  let AC=null, soundOn=true;
  function ac(){ if(!AC){ try{ AC=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } if(AC&&AC.state==='suspended')AC.resume(); return AC; }
  function beep(freq,dur,type,vol,slideTo){ const c=ac(); if(!c||!soundOn)return; const o=c.createOscillator(),g=c.createGain();
    o.type=type||'sine'; o.frequency.setValueAtTime(freq,c.currentTime); if(slideTo)o.frequency.exponentialRampToValueAtTime(slideTo,c.currentTime+dur);
    g.gain.setValueAtTime(0.0001,c.currentTime); g.gain.exponentialRampToValueAtTime(vol||0.15,c.currentTime+0.012); g.gain.exponentialRampToValueAtTime(0.0001,c.currentTime+dur);
    o.connect(g).connect(c.destination); o.start(); o.stop(c.currentTime+dur+0.03); }
  function sTick(){ beep(500+Math.random()*50,0.05,'triangle',0.09); }
  function sGood(){ [523,659,784,1047].forEach((f,i)=>setTimeout(()=>beep(f,0.18,'sine',0.15),i*70)); }
  function sBonus(){ beep(680,0.12,'sine',0.12); setTimeout(()=>beep(900,0.14,'sine',0.12),85); }
  function sBad(){ beep(320,0.10,'triangle',0.10,250); setTimeout(()=>beep(240,0.15,'triangle',0.10,185),75); }
  function sShuffle(){ beep(320,0.2,'triangle',0.08,720); }
  function sWin(){ [523,659,784,1047,1319].forEach((f,i)=>setTimeout(()=>beep(f,0.26,'sine',0.17),i*95)); }
  /* zip (word strip) */
  let acc=0; const ZTICK=17;
  function zipTick(sp){ const c=ac(); if(!c||!soundOn)return; const t=c.currentTime;
    const o=c.createOscillator(),g=c.createGain(),f=c.createBiquadFilter();
    f.type='bandpass'; f.frequency.value=1500+Math.random()*1300; f.Q.value=6;
    o.type='triangle'; o.frequency.value=210+Math.random()*130;
    const vol=Math.min(.05,.012+Math.abs(sp)*.0015);
    g.gain.setValueAtTime(vol,t); g.gain.exponentialRampToValueAtTime(0.0001,t+0.03);
    o.connect(f); f.connect(g); g.connect(c.destination); o.start(t); o.stop(t+0.035); }
  function zip(d){ acc+=Math.abs(d); while(acc>=ZTICK){ acc-=ZTICK; zipTick(d);} }
  window.addEventListener('pointerdown',function(){ ac(); });

  const $=id=>document.getElementById(id);
  const room=$('room'), wheel=$('wheel'), poly=$('poly');

  /* scene image + blurred bg copy */
  $('roomPhoto').src=LEVEL.image; $('bgPhoto').src=LEVEL.image;
  $('lcSub').textContent=LEVEL.place;

  /* -------- FX overlays from data -------- */
  function placeFx(){ const layer=$('fxLayer'); layer.innerHTML='';
    OBJECTS.forEach(w=>{ const f=FOCUS[w]; const el=document.createElement('div');
      el.className='fx '+(f.fx==='leaf'?'leaf':(f.fx==='radar'?'radar':'glow')); el.id='fx_'+w;
      const wd=f.w||24, ht=f.h||24;
      el.style.left=(f.x-wd/2)+'%'; el.style.top=(f.y-ht/2)+'%'; el.style.width=wd+'%'; el.style.height=ht+'%';
      layer.appendChild(el); }); }

  /* ============================ WORD STRIP ============================ */
  const win=$('win'), track=$('track');
  let offset=0, minOff=0, maxOff=0;
  function buildStrip(){
    track.innerHTML='';
    const pad=Math.round(win.clientWidth/2)-28;
    track.style.paddingLeft=pad+'px'; track.style.paddingRight=pad+'px';
    OBJECTS.forEach(w=>{
      const solved=found.has(w); const rev=revealed[w];
      const d=document.createElement('div'); d.className='wd'+(solved?' solved':'');
      d.dataset.s=solved?1:0; d.dataset.word=w;
      let fill=0;
      if(solved){ d.textContent='✓ '+w; fill=w.length; }
      else { for(let i=0;i<w.length;i++){ const c=document.createElement('span');
               const show=rev&&rev.has(i); c.className='cell'+(show?' fill':''); if(show){c.textContent=w[i]; fill++;} d.appendChild(c); } }
      d.dataset.fill=fill; track.appendChild(d);
    });
    measure(); clampOff(); applyOff();
  }
  function measure(){ const ww=win.clientWidth, tw=track.scrollWidth; minOff=Math.min(0,ww-tw); maxOff=0; }
  function clampOff(){ if(offset>maxOff)offset=maxOff; if(offset<minOff)offset=minOff; }
  function applyOff(){ track.style.transform='translateX('+offset+'px)'; }
  let sDrag=false,sx=0,so=0,lx=0,lt=0,vel=0,sraf=null;
  function spx(e){ return e.touches?e.touches[0].clientX:e.clientX; }
  function sDown(e){ ac(); sDrag=true; win.classList.add('drag'); cancelAnimationFrame(sraf);
    sx=spx(e); so=offset; lx=sx; lt=performance.now(); vel=0; e.preventDefault(); }
  function sMove(e){ if(!sDrag)return; const x=spx(e),prev=offset; offset=so+(x-sx); clampOff(); zip(offset-prev);
    const now=performance.now(),dt=now-lt; if(dt>0)vel=(x-lx)/dt*16; lx=x; lt=now; applyOff(); e.preventDefault(); }
  function sUp(){ if(!sDrag)return; sDrag=false; win.classList.remove('drag'); sInertia(); }
  function sInertia(){ if(Math.abs(vel)>0.4){ const prev=offset; offset+=vel; clampOff(); zip(offset-prev); vel*=0.9; applyOff(); sraf=requestAnimationFrame(sInertia); } else snap(); }
  function snap(){ const center=win.clientWidth/2; let best=null,bs=1e9;
    [...track.children].forEach(el=>{ if(el.dataset.s==='1')return; const c=el.offsetLeft+el.offsetWidth/2+offset;
      const sc=Math.abs(c-center)+parseInt(el.dataset.fill)*6; if(sc<bs){bs=sc;best=el;} });
    if(!best)return; let t=Math.round(win.clientWidth/2-(best.offsetLeft+best.offsetWidth/2)); t=Math.max(minOff,Math.min(maxOff,t)); ease(t); }
  function ease(to){ cancelAnimationFrame(sraf); (function step(){ const prev=offset; offset+=(to-offset)*0.16;
    if(Math.abs(offset-prev)>0.1){ zip(offset-prev); applyOff(); sraf=requestAnimationFrame(step);} else { offset=to; applyOff(); } })(); }
  win.addEventListener('mousedown',sDown); window.addEventListener('mousemove',sMove); window.addEventListener('mouseup',sUp);
  win.addEventListener('touchstart',sDown,{passive:false}); win.addEventListener('touchmove',sMove,{passive:false}); window.addEventListener('touchend',sUp);

  /* ============================ HELP TOOLS ============================ */
  const HELPS=[
    {k:'letter',ic:'🔤',label:'LETTER',cost:COST.letter},
    {k:'first', ic:'🅰️',label:'FIRST', cost:COST.first},
    {k:'zoom',  ic:'🔍',label:'ZOOM',  cost:COST.zoom},
    {k:'radar', ic:'📡',label:'RADAR', cost:COST.radar},
    {k:'solve', ic:'💡',label:'SOLVE', cost:COST.solve, cls:'solve'},
    {k:'skip',  ic:'⏭️',label:'SKIP',  cost:0, cls:'skip', ad:true}
  ];
  const helpNodes={};
  function buildHelps(){
    HELPS.forEach(h=>{ const el=document.createElement('div'); el.className='ht'+(h.cls?(' '+h.cls):'');
      el.innerHTML='<span class="hi">'+h.ic+'</span><b>'+h.label+'</b>'+(h.ad?'<span class="ad">▶ AD</span>':'<small>−'+h.cost+'◈</small>');
      el.addEventListener('click',()=>useHelp(h.k)); helpNodes[h.k]=el; });
    placeHelps();
  }
  function placeHelps(){
    const land=window.matchMedia('(orientation:landscape)').matches;
    const grid=$('helps'), L=$('lHleft'), R=$('lHright');
    if(land){ grid.innerHTML=''; L.innerHTML=''; R.innerHTML='';
      ['letter','first','zoom'].forEach(k=>L.appendChild(helpNodes[k]));
      ['radar','solve','skip'].forEach(k=>R.appendChild(helpNodes[k])); }
    else { L.innerHTML=''; R.innerHTML=''; grid.innerHTML='';
      HELPS.forEach(h=>grid.appendChild(helpNodes[h.k])); }
    refreshHelpState();
  }
  function refreshHelpState(){ HELPS.forEach(h=>{ if(h.ad)return; const el=helpNodes[h.k];
    if(el) el.classList.toggle('disabled', coins<h.cost && h.cost>0 ); }); }

  function useHelp(k){
    if(k==='skip'){ openAd(); return; }
    const cost=COST[k];
    if(coins<cost){ sBad(); return; }
    if(k==='letter'){ const cand=OBJECTS.filter(w=>!found.has(w)&&(!revealed[w]||revealed[w].size<w.length)); if(!cand.length){ sBad(); return; }
      const w=cand[Math.floor(Math.random()*cand.length)]; if(!revealed[w])revealed[w]=new Set();
      const pos=[]; for(let i=0;i<w.length;i++) if(!revealed[w].has(i))pos.push(i);
      revealed[w].add(pos[Math.floor(Math.random()*pos.length)]); spend(cost); sBonus(); buildStrip();
      if(revealed[w].size===w.length) solve(w,false); }
    else if(k==='first'){ let did=false; OBJECTS.forEach(w=>{ if(found.has(w)){return;} if(!revealed[w])revealed[w]=new Set();
        if(!revealed[w].has(0)){ revealed[w].add(0); did=true; } });
      if(!did){ sBad(); return; } spend(cost); sBonus(); buildStrip(); }
    else if(k==='zoom'){ const cand=OBJECTS.filter(w=>!found.has(w)); if(!cand.length){ sBad(); return; }
      spend(cost); const w=cand[zoomIx%cand.length]; zoomIx++; peek(w); sBonus(); }
    else if(k==='radar'){ const cand=OBJECTS.filter(w=>!found.has(w)); if(!cand.length){ sBad(); return; }
      spend(cost); sBonus(); cand.forEach(w=>{ const el=$('fx_'+w); if(el){ el.classList.remove('radar','on'); el.className='fx radar'; void el.offsetWidth; el.classList.add('on'); setTimeout(()=>{el.classList.remove('on'); el.className='fx '+(FOCUS[w].fx==='leaf'?'leaf':'glow');},1700); } }); }
    else if(k==='solve'){ const cand=OBJECTS.filter(w=>!found.has(w)); if(!cand.length){ sBad(); return; }
      spend(cost); const w=cand[Math.floor(Math.random()*cand.length)]; solve(w,false); }
  }
  function spend(n){ coins-=n; setCoins(); }
  function openAd(){ if(OBJECTS.every(w=>found.has(w))) return; $('admodal').classList.add('show'); }
  $('adWatch').addEventListener('click',()=>{ $('admodal').classList.remove('show'); OBJECTS.forEach(w=>{ if(!found.has(w)) solve(w,false,true); }); });
  $('adClose').addEventListener('click',()=>$('admodal').classList.remove('show'));

  /* ============================ WHEEL ============================ */
  let order=LEVEL.letters.slice();
  function layout(){
    wheel.querySelectorAll('.letter').forEach(n=>n.remove());
    const R=66,cx=120,cy=120;
    order.forEach((ch,i)=>{ const a=(-90+i*(360/order.length))*Math.PI/180;
      const x=cx+R*Math.cos(a), y=cy+R*Math.sin(a);
      const el=document.createElement('div'); el.className='letter'; el.textContent=ch;
      el.style.left=x+'px'; el.style.top=y+'px'; el.dataset.ch=ch; el._pt={x,y}; wheel.appendChild(el); });
  }
  let wDrag=false,picked=[];
  function wpt(e){ const r=wheel.getBoundingClientRect(),t=e.touches?e.touches[0]:e; return {x:(t.clientX-r.left)*(240/r.width),y:(t.clientY-r.top)*(240/r.height)}; }
  function nearest(p){ let b=null,bd=999; wheel.querySelectorAll('.letter').forEach(el=>{ const d=Math.hypot(el._pt.x-p.x,el._pt.y-p.y); if(d<30&&d<bd){bd=d;b=el;} }); return b; }
  function line(ex){ const pts=picked.map(el=>el._pt.x+','+el._pt.y); if(ex)pts.push(ex.x+','+ex.y); poly.setAttribute('points',pts.join(' ')); }
  function cw(){ const w=picked.map(el=>el.dataset.ch).join(''); const b=$('cwbubble');
    if(w){ b.textContent=w; b.classList.add('show'); } else b.classList.remove('show'); }
  function add(el){ if(!el||picked.includes(el))return; picked.push(el); el.classList.add('active'); cw(); line(); sTick(); }
  function wStart(e){ if(focusing)return; wDrag=true; picked=[]; add(nearest(wpt(e))); e.preventDefault(); }
  function wMove(e){ if(!wDrag)return; const p=wpt(e); add(nearest(p)); line(p); e.preventDefault(); }
  function wEnd(){ if(!wDrag)return; wDrag=false; const w=picked.map(el=>el.dataset.ch).join(''); poly.setAttribute('points','');
    wheel.querySelectorAll('.letter.active').forEach(el=>el.classList.remove('active')); $('cwbubble').classList.remove('show'); evaluate(w); picked=[]; }
  wheel.addEventListener('mousedown',wStart); wheel.addEventListener('touchstart',wStart,{passive:false});
  window.addEventListener('mousemove',wMove); window.addEventListener('touchmove',wMove,{passive:false});
  window.addEventListener('mouseup',wEnd); window.addEventListener('touchend',wEnd);

  function evaluate(w){
    if(w.length<3) return;
    if(OBJECTS.includes(w)&&!found.has(w)){ solve(w,true); return; }
    if(BONUS.includes(w)&&!bonusFound.has(w)){ bonusFound.add(w); coins+=ECON.bonusWord; setCoins(); sBonus(); plusFlash('+'+ECON.bonusWord+' ◈'); updateFindbar(); return; }
    sBad();
  }
  function plusFlash(txt){ const p=$('plusflash'); p.textContent=txt; p.classList.remove('show'); void p.offsetWidth; p.classList.add('show'); }

  /* ---- solve an object ---- */
  function solve(w,byPlayer,silent){
    if(found.has(w))return;
    found.add(w); if(byPlayer!==false && !silent) coins+=ECON.objectFind; setCoins();
    if(!silent) sGood(); buildStrip(); updateFindbar();
    const f=FOCUS[w]; focusing=true;
    room.style.transition='transform 1100ms cubic-bezier(.6,.01,.15,1)';
    const mx=(50-f.x)*f.z, my=(50-f.y)*f.z; room.style.transform='translate('+(mx*0.55)+'%,'+(my*0.55)+'%) scale('+f.z+')';
    setTimeout(()=>react(w,f),540);
    setTimeout(()=>{ room.style.transform=''; },2100);
    setTimeout(()=>{ focusing=false; },3200);
    if(OBJECTS.every(x=>found.has(x))) setTimeout(levelComplete,2300);
  }
  function react(w,f){ const el=$('fx_'+w);
    if(el){ el.classList.remove('on'); void el.offsetWidth; el.classList.add('on'); setTimeout(()=>el.classList.remove('on'),1700); }
    if(f.fx==='leaf'){ for(let i=0;i<12;i++){ const sp=document.createElement('div'); sp.className='spark';
      sp.style.left=(f.x-8+Math.random()*16)+'%'; sp.style.top=(f.y-6+Math.random()*14)+'%';
      room.appendChild(sp); void sp.offsetWidth; sp.style.animationDelay=(i*50)+'ms'; sp.classList.add('on');
      setTimeout(()=>sp.remove(),1400); } }
  }
  function peek(w){ const f=FOCUS[w]; focusing=true;
    room.style.transition='transform 900ms cubic-bezier(.6,.01,.15,1)';
    const mx=(50-f.x)*f.z, my=(50-f.y)*f.z; room.style.transform='translate('+(mx*0.55)+'%,'+(my*0.55)+'%) scale('+f.z+')';
    setTimeout(()=>react(w,f),500);
    setTimeout(()=>{ room.style.transform=''; },1500);
    setTimeout(()=>{ focusing=false; },2500); }

  /* ---- shuffle ---- */
  const shuffleBtn=$('shuffle');
  function doShuffle(e){ if(e){ e.stopPropagation(); e.preventDefault(); }
    for(let i=order.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [order[i],order[j]]=[order[j],order[i]]; }
    sShuffle(); layout(); }
  shuffleBtn.addEventListener('touchstart',doShuffle,{passive:false});
  shuffleBtn.addEventListener('mousedown',doShuffle);
  shuffleBtn.addEventListener('click',e=>e.stopPropagation());

  /* ---- HUD / findbar ---- */
  function setCoins(){ $('coinN').textContent=coins; refreshHelpState(); }
  function updateFindbar(){ $('findPill').textContent='🔍 Find '+found.size+'/'+OBJECTS.length;
    $('bonusPill').textContent='✦ '+bonusFound.size+' bonus'; }

  /* ---- level complete ---- */
  function levelComplete(){ sWin();
    coins+=ECON.levelBonus; setCoins();
    const objScore=found.size*ECON.objectFind, bonScore=bonusFound.size*ECON.bonusWord, total=objScore+bonScore+ECON.levelBonus;
    $('lcRows').innerHTML=
      '<div class="row"><span>Objects found · '+found.size+'</span><span>+'+objScore+' ◈</span></div>'+
      '<div class="row"><span>Bonus words · '+bonusFound.size+'</span><span>+'+bonScore+' ◈</span></div>'+
      '<div class="row"><span>Level bonus</span><span>+'+ECON.levelBonus+' ◈</span></div>'+
      '<div class="row total"><span>Total</span><span>+'+total+' ◈</span></div>';
    $('lcBwH').textContent='Bonus words · '+bonusFound.size+' / '+BONUS.length+' found';
    $('lcBwords').innerHTML=BONUS.map(w=>'<span class="bw'+(bonusFound.has(w)?' got':'')+'">'+w+'</span>').join('');
    $('lcover').classList.add('show');
    for(let i=0;i<24;i++){ const c=document.createElement('div'); c.className='confetti'; c.style.left=Math.random()*100+'%';
      c.style.background=['#e8bf76','#7CF0B4','#8fd0ff','#ff9db1'][i%4]; c.style.animation='fall '+(1.2+Math.random())+'s linear '+(Math.random()*.4)+'s forwards';
      document.querySelector('.phone').appendChild(c); } }
  const st=document.createElement('style'); st.textContent='@keyframes fall{to{transform:translateY(940px) rotate(540deg);opacity:0}}'; document.head.appendChild(st);
  $('nextBtn').addEventListener('click',()=>{ $('lcover').classList.remove('show');
    found.clear(); bonusFound.clear(); Object.keys(revealed).forEach(k=>delete revealed[k]);
    zoomIx=0; focusing=false; room.style.transform=''; document.querySelectorAll('.confetti').forEach(c=>c.remove());
    buildStrip(); updateFindbar(); refreshHelpState(); });

  /* ---- orientation / resize ---- */
  let lastLand=window.matchMedia('(orientation:landscape)').matches;
  window.addEventListener('resize',()=>{ const land=window.matchMedia('(orientation:landscape)').matches;
    if(land!==lastLand){ lastLand=land; placeHelps(); } measure(); clampOff(); applyOff(); });
  window.addEventListener('orientationchange',()=>setTimeout(()=>{ placeHelps(); buildStrip(); },120));

  /* ---- init ---- */
  $('lvl').textContent=LEVEL.round; setCoins(); updateFindbar();
  placeFx(); buildHelps(); layout();
  function initStrip(){ buildStrip(); snap(); }
  if(document.readyState==='complete') initStrip(); else window.addEventListener('load',initStrip);
})();
</script>

<script>(function(){var el=document.getElementById("intro");if(!el)return;function hide(){el.classList.add("hide");setTimeout(function(){el.style.display="none";},650);}var t=setTimeout(hide,2600);el.addEventListener("pointerdown",function(){clearTimeout(t);hide();});})();</script>
