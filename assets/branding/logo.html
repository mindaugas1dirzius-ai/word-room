<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Fredoka','Trebuchet MS',sans-serif; }

  /* ---------- APP ICON ---------- */
  .icon {
    width:512px; height:512px; border-radius:118px; position:relative; overflow:hidden;
    background:
      radial-gradient(130% 120% at 28% 18%, #FFD37A 0%, #FF9A56 38%, #FF6A5A 68%, #FF4E7E 100%);
    box-shadow:
      inset 0 6px 12px rgba(255,255,255,.45),
      inset 0 -26px 46px rgba(168,32,74,.40),
      0 34px 70px rgba(0,0,0,.45);
    display:flex; align-items:center; justify-content:center;
  }
  .icon .gloss {
    position:absolute; top:-16%; left:-12%; width:124%; height:58%;
    background:linear-gradient(180deg, rgba(255,255,255,.42), rgba(255,255,255,0));
    border-radius:0 0 50% 50%/0 0 100% 100%; filter:blur(2px);
  }
  .icon svg { position:relative; z-index:2; filter:drop-shadow(0 10px 16px rgba(120,20,45,.45)); }

  /* ---------- WORDMARK ---------- */
  .wm { font-weight:700; letter-spacing:-1px; line-height:1; display:inline-block; }
  .wm .spell { color:#ffffff; }
  .wm .nook  { background:linear-gradient(180deg,#FFDC8A,#FF9E3D); -webkit-background-clip:text; background-clip:text; color:transparent; }

  /* ---------- BOARD (preview) ---------- */
  #board {
    width:1200px; height:1500px; position:relative;
    background:radial-gradient(120% 90% at 50% 12%, #16233f 0%, #0c1424 55%, #070b16 100%);
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:70px;
  }
  #board .halo {
    position:absolute; top:120px; left:50%; transform:translateX(-50%);
    width:640px; height:640px; border-radius:50%;
    background:radial-gradient(circle, rgba(255,140,90,.30), transparent 62%); filter:blur(20px);
  }
  #board .icon { z-index:2; }
  #board .lock { display:flex; align-items:center; gap:34px; z-index:2; }
  #board .lock .icon { width:150px; height:150px; border-radius:36px; box-shadow:inset 0 3px 6px rgba(255,255,255,.4), inset 0 -10px 20px rgba(168,32,74,.4), 0 14px 30px rgba(0,0,0,.5); }
  #board .lock .icon svg { width:96px; height:96px; }
  #board .lock .wm { font-size:104px; }
  #board .big { z-index:2; font-size:150px; text-align:center; }
  #board .tag {
    z-index:2; font-weight:500; letter-spacing:10px; font-size:34px; text-transform:uppercase;
    color:#9fb3d6;
  }
  .glow { text-shadow:0 4px 30px rgba(255,150,90,.45); }

  /* ---------- CLEAN SQUARE APP ICON (submission) ---------- */
  .appicon {
    width:1024px; height:1024px; position:relative; overflow:hidden;
    background:radial-gradient(130% 120% at 28% 18%, #FFD37A 0%, #FF9A56 38%, #FF6A5A 68%, #FF4E7E 100%);
    display:flex; align-items:center; justify-content:center;
  }
  .appicon .gloss {
    position:absolute; top:-16%; left:-12%; width:124%; height:58%;
    background:linear-gradient(180deg, rgba(255,255,255,.42), rgba(255,255,255,0));
    border-radius:0 0 50% 50%/0 0 100% 100%; filter:blur(2px);
  }
  .appicon svg { position:relative; z-index:2; width:600px; height:600px; filter:drop-shadow(0 16px 26px rgba(120,20,45,.45)); }

  /* ---------- STANDALONE WORDMARK (transparent) ---------- */
  .wmstand { display:inline-block; font-weight:700; font-size:240px; letter-spacing:-2px; padding:60px 50px; }
</style>
</head>
<body>
<div id="board">
  <div class="halo"></div>

  <!-- Hero app icon -->
  <div class="icon" id="icon">
    <div class="gloss"></div>
    <!-- magnifying glass with a letter tile in the lens -->
    <svg width="300" height="300" viewBox="0 0 300 300" fill="none">
      <!-- handle -->
      <line x1="196" y1="196" x2="266" y2="266" stroke="#ffffff" stroke-width="40" stroke-linecap="round"/>
      <line x1="196" y1="196" x2="266" y2="266" stroke="#FFE1B0" stroke-width="16" stroke-linecap="round"/>
      <!-- lens ring -->
      <circle cx="122" cy="122" r="104" stroke="#ffffff" stroke-width="30"/>
      <!-- letter tile inside lens -->
      <rect x="70" y="70" width="104" height="104" rx="26" fill="#ffffff"/>
      <text x="122" y="158" font-family="Fredoka,Trebuchet MS,sans-serif" font-weight="700" font-size="104" fill="#FF6A5A" text-anchor="middle">S</text>
    </svg>
  </div>

  <!-- horizontal lockup -->
  <div class="lock">
    <div class="icon">
      <div class="gloss"></div>
      <svg width="96" height="96" viewBox="0 0 300 300" fill="none">
        <line x1="196" y1="196" x2="266" y2="266" stroke="#ffffff" stroke-width="40" stroke-linecap="round"/>
        <circle cx="122" cy="122" r="104" stroke="#ffffff" stroke-width="30"/>
        <rect x="70" y="70" width="104" height="104" rx="26" fill="#ffffff"/>
        <text x="122" y="158" font-family="Fredoka,Trebuchet MS,sans-serif" font-weight="700" font-size="104" fill="#FF6A5A" text-anchor="middle">S</text>
      </svg>
    </div>
    <div class="wm glow"><span class="spell">Spell</span><span class="nook">nook</span></div>
  </div>

  <!-- tagline -->
  <div class="tag">find · spell · explore</div>
</div>

<!-- clean square app icon for submission -->
<div class="appicon" id="appicon">
  <div class="gloss"></div>
  <svg viewBox="0 0 300 300" fill="none">
    <line x1="196" y1="196" x2="266" y2="266" stroke="#ffffff" stroke-width="40" stroke-linecap="round"/>
    <line x1="196" y1="196" x2="266" y2="266" stroke="#FFE1B0" stroke-width="16" stroke-linecap="round"/>
    <circle cx="122" cy="122" r="104" stroke="#ffffff" stroke-width="30"/>
    <rect x="70" y="70" width="104" height="104" rx="26" fill="#ffffff"/>
    <text x="122" y="158" font-family="Fredoka,Trebuchet MS,sans-serif" font-weight="700" font-size="104" fill="#FF6A5A" text-anchor="middle">S</text>
  </svg>
</div>

<!-- standalone wordmark (transparent bg) -->
<div class="wm wmstand" id="wordmark"><span class="spell">Spell</span><span class="nook">nook</span></div>
</body>
</html>
